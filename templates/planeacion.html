<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Planeación - La Postal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ESTILOS BÁSICOS */
        :root {
            --color-bg: #000000;
            --color-card: #1a1a1a;
            --color-text: #ffffff;
            --color-accent: #b71c1c;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .corporate-header {
            background: linear-gradient(135deg, #8b0000 0%, #b71c1c 100%);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }

        .main-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background-color: var(--color-card);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            border-left: 5px solid var(--color-accent);
        }

        .card-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }

        .filter-section {
            background-color: var(--color-card);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .data-table-container {
            background-color: var(--color-card);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background-color: #2a2a2a;
            padding: 1rem;
            text-align: left;
            font-weight: bold;
            border-bottom: 2px solid var(--color-accent);
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid #333;
        }

        .data-table tr:hover {
            background-color: rgba(183, 28, 28, 0.1);
        }

        /* ESTILOS DE PAGINACIÓN SIMPLES */
        .pagination-container {
            padding: 1rem;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .pagination-btn {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .pagination-btn:hover:not(.disabled) {
            background-color: var(--color-accent);
            border-color: var(--color-accent);
        }

        .pagination-btn.active {
            background-color: var(--color-accent);
            border-color: var(--color-accent);
            font-weight: bold;
        }

        .pagination-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-info {
            color: #aaa;
            font-size: 0.9rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        select,
        input {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 0.5rem;
            border-radius: 5px;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- ENCABEZADO -->
    <div class="corporate-header">
        <div style="font-size: 2.5rem; font-weight: bold;">LA POSTAL</div>
        <div style="font-size: 1.2rem;">Sistema de Gestión de Actividades</div>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="main-container">
        <!-- TARJETAS RESUMEN -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="card-number" id="contadorTotal">0</div>
                <div>TOTAL</div>
            </div>
            <div class="summary-card">
                <div class="card-number" id="contadorVigentes">0</div>
                <div>VIGENTES</div>
            </div>
            <div class="summary-card">
                <div class="card-number" id="contadorVencidos">0</div>
                <div>VENCIDOS</div>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="filter-section">
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <div style="margin-bottom: 0.5rem; color: #aaa;">Sucursal:</div>
                    <select id="branchFilter" style="width: 100%;">
                        <option value="all">Todas</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <div style="margin-bottom: 0.5rem; color: #aaa;">Estatus:</div>
                    <select id="estatusFilter" style="width: 100%;">
                        <option value="all">Todos</option>
                        <option value="vigente">Vigente</option>
                        <option value="vencido">Vencido</option>
                        <option value="en-tramite">En trámite</option>
                        <option value="pendiente">Pendiente</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <div style="margin-bottom: 0.5rem; color: #aaa;">Mostrar:</div>
                    <select id="itemsPerPage" style="width: 100%;">
                        <option value="10">10 registros</option>
                        <option value="25" selected>25 registros</option>
                        <option value="50">50 registros</option>
                        <option value="100">100 registros</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <div style="margin-bottom: 0.5rem; color: #aaa;">Buscar:</div>
                    <input type="text" id="busquedaInput" placeholder="Buscar..." style="width: 100%;">
                </div>
            </div>
        </div>

        <!-- TABLA DE DATOS -->
        <div class="data-table-container">
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>SUCURSAL</th>
                            <th>PERMISO</th>
                            <th>ESTATUS</th>
                            <th>FECHA RENOVACIÓN</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody">
                        <!-- Los datos se cargarán aquí -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- PAGINACIÓN -->
        <div class="pagination-container">
            <div class="pagination-info" id="paginationInfo">
                Mostrando 0 de 0 registros
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="pagination-btn" id="firstPage">« Primera</button>
                <button class="pagination-btn" id="prevPage">‹ Anterior</button>
                <div id="pageNumbers" style="display: flex; gap: 0.3rem;"></div>
                <button class="pagination-btn" id="nextPage">Siguiente ›</button>
                <button class="pagination-btn" id="lastPage">Última »</button>
            </div>
        </div>

        <!-- BOTÓN AGREGAR -->
        <div style="text-align: center; margin-top: 2rem;">
            <button id="btnAgregar"
                style="background-color: #b71c1c; color: white; border: none; padding: 0.8rem 2rem; border-radius: 5px; font-size: 1rem;">
                <i class="fas fa-plus"></i> Agregar Nuevo Registro
            </button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = 'https://uooffrtjajluvhcauctk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ib_7iPl1ccS0PGo3yKzggQ_nWMi9CU8';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DATOS DE SUCURSALES
        const branchData = [
            { name: "5 Y 10", block: "3" }, { name: "ALEMÁN", block: "3" },
            { name: "BRISAS", block: "1" }, { name: "CACHO", block: "1" },
            { name: "CALIFORNIAS", block: "3" }, { name: "CAMPESTRE MURUA", block: "3" },
            { name: "CAMPIÑA", block: "3" }, { name: "CAPISTRANO", block: "3" },
            { name: "COLINA AZUL", block: "3" }, { name: "DARUMMITA LIBERTAD", block: "3" },
            { name: "DARUMMITA PLAYAS", block: "2" }, { name: "ENSENADA", block: "1" },
            { name: "FLORIDO", block: "3" }, { name: "INDEPENDENCIA", block: "3" },
            { name: "LAGO", block: "3" }, { name: "LIBERTAD", block: "3" },
            { name: "MALECÓN", block: "3" }, { name: "MALECÓN 2", block: "3" },
            { name: "MARIANO MATAMOROS", block: "3" }, { name: "MATRIZ", block: "1" },
            { name: "MURUA", block: "3" }, { name: "PANAMERICANO", block: "3" },
            { name: "PLAYAS 1", block: "1" }, { name: "ROSARITO 3", block: "2" },
            { name: "SOLER", block: "3" }, { name: "TORRES", block: "1" },
            { name: "VENECIA", block: "3" }, { name: "ZONA NORTE", block: "3" },
            { name: "ZONA RÍO", block: "3" }
        ];

        // VARIABLES GLOBALES
        let permisosGuardados = [];
        let currentPage = 1;
        let itemsPerPage = 25;
        let filteredData = [];
        let totalPages = 1;

        // FUNCIONES DE PAGINACIÓN SIMPLIFICADAS
        function updatePagination() {
            const totalItems = filteredData.length;
            const startItem = (currentPage - 1) * itemsPerPage + 1;
            const endItem = Math.min(currentPage * itemsPerPage, totalItems);

            // Actualizar información
            document.getElementById('paginationInfo').textContent =
                `Mostrando ${startItem} a ${endItem} de ${totalItems} registros`;

            // Actualizar botones de página
            updatePageButtons();

            // Actualizar estado de botones
            updateButtonStates();
        }

        function updatePageButtons() {
            const pageNumbersDiv = document.getElementById('pageNumbers');
            pageNumbersDiv.innerHTML = '';

            // Solo mostrar 5 números de página alrededor de la página actual
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);

            // Ajustar si estamos cerca del inicio
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => goToPage(i);
                pageNumbersDiv.appendChild(pageBtn);
            }
        }

        function updateButtonStates() {
            document.getElementById('firstPage').className = `pagination-btn ${currentPage === 1 ? 'disabled' : ''}`;
            document.getElementById('prevPage').className = `pagination-btn ${currentPage === 1 ? 'disabled' : ''}`;
            document.getElementById('nextPage').className = `pagination-btn ${currentPage === totalPages ? 'disabled' : ''}`;
            document.getElementById('lastPage').className = `pagination-btn ${currentPage === totalPages ? 'disabled' : ''}`;
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            mostrarRegistrosEnTabla();
            updatePagination();
        }

        // FUNCIONES PRINCIPALES
        async function cargarDatosIniciales() {
            try {
                console.log('Cargando datos desde Supabase...');
                const { data, error } = await supabaseClient
                    .from('datos_financieros')
                    .select('*')
                    .order('creado_en', { ascending: false });

                if (error) throw error;

                if (data && data.length > 0) {
                    permisosGuardados = data.map(item => ({
                        id: item.id,
                        bloque: item.bloque,
                        sucursal: item.sucursal,
                        permiso: item.tipo_permiso,
                        existencia: item.existencia,
                        estatus: item.estatus,
                        fechaExpedicion: item.fecha_expedicion,
                        fechaRenovacion: item.fecha_renovacion,
                        estatusLegal: item.estatus_legal,
                        permisoLegal: item.permiso_legal,
                        archivoNombre: item.archive_nombre
                    }));
                    console.log(`✅ Cargados ${permisosGuardados.length} registros`);
                } else {
                    console.log('ℹ️ No hay datos en Supabase');
                    permisosGuardados = JSON.parse(localStorage.getItem('permisos')) || [];
                }
                localStorage.setItem('permisos', JSON.stringify(permisosGuardados));
            } catch (error) {
                console.error('❌ Error:', error);
                permisosGuardados = JSON.parse(localStorage.getItem('permisos')) || [];
            }

            // Crear opciones de sucursales para el filtro
            const branchFilter = document.getElementById('branchFilter');
            branchData.forEach(branch => {
                const option = document.createElement('option');
                option.value = branch.name;
                option.textContent = branch.name;
                branchFilter.appendChild(option);
            });

            // Inicializar datos filtrados
            filteredData = [...permisosGuardados];
            mostrarRegistrosEnTabla();
            actualizarContadores();
        }

        function mostrarRegistrosEnTabla() {
            const tablaBody = document.getElementById('tablaBody');
            if (!tablaBody) return;

            // Calcular datos para la página actual
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);

            // Calcular total de páginas
            totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (totalPages === 0) totalPages = 1;

            tablaBody.innerHTML = '';

            if (pageData.length === 0) {
                tablaBody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; color: #aaa; padding: 2rem;">
                            No hay registros. Haz clic en "Agregar" para crear uno.
                        </td>
                    </tr>`;
                return;
            }

            pageData.forEach((permiso, index) => {
                const originalIndex = permisosGuardados.findIndex(p => p.id === permiso.id);
                let estadoColor = '#aaa';
                if (permiso.estatus === 'vigente') estadoColor = '#4caf50';
                if (permiso.estatus === 'en-tramite') estadoColor = '#ff9800';
                if (permiso.estatus === 'vencido') estadoColor = '#f44336';

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${permiso.sucursal || ''}</td>
                    <td>${permiso.permiso || ''}</td>
                    <td>
                        <span class="status-badge" style="background-color: ${estadoColor}20; color: ${estadoColor};">
                            ${(permiso.estatus || '').toUpperCase()}
                        </span>
                    </td>
                    <td>${permiso.fechaRenovacion || ''}</td>
                    <td>
                        <button onclick="editarRegistro(${originalIndex})" style="background: none; border: 1px solid #444; color: white; padding: 0.3rem 0.6rem; border-radius: 3px; margin-right: 0.3rem;">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="eliminarRegistro(${originalIndex})" style="background: none; border: 1px solid #444; color: #ff6b6b; padding: 0.3rem 0.6rem; border-radius: 3px;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tablaBody.appendChild(row);
            });

            // Actualizar paginación
            updatePagination();
        }

        function filtrarVistaActual() {
            const branchFilter = document.getElementById('branchFilter').value;
            const estatusFilter = document.getElementById('estatusFilter').value;
            const busqueda = document.getElementById('busquedaInput').value.toLowerCase();

            // Resetear a la primera página
            currentPage = 1;

            filteredData = [...permisosGuardados];

            if (branchFilter !== 'all') filteredData = filteredData.filter(p => p.sucursal === branchFilter);
            if (estatusFilter !== 'all') filteredData = filteredData.filter(p => p.estatus === estatusFilter);
            if (busqueda) {
                filteredData = filteredData.filter(p =>
                    (p.sucursal && p.sucursal.toLowerCase().includes(busqueda)) ||
                    (p.permiso && p.permiso.toLowerCase().includes(busqueda)) ||
                    (p.estatusLegal && p.estatusLegal.toLowerCase().includes(busqueda))
                );
            }

            mostrarRegistrosEnTabla();
            actualizarContadores();
        }

        function actualizarContadores() {
            const total = permisosGuardados.length;
            const vigentes = permisosGuardados.filter(p => p.estatus === 'vigente').length;
            const vencidos = permisosGuardados.filter(p => p.estatus === 'vencido').length;

            document.getElementById('contadorTotal').textContent = total;
            document.getElementById('contadorVigentes').textContent = vigentes;
            document.getElementById('contadorVencidos').textContent = vencidos;
        }

        function editarRegistro(index) {
            alert('Funcionalidad de editar para el registro: ' + index);
        }

        function eliminarRegistro(index) {
            if (confirm('¿Estás seguro de eliminar este registro?')) {
                permisosGuardados.splice(index, 1);
                localStorage.setItem('permisos', JSON.stringify(permisosGuardados));
                filtrarVistaActual();
            }
        }

        // INICIALIZACIÓN
        document.addEventListener('DOMContentLoaded', async function () {
            console.log('🚀 Iniciando aplicación...');

            await cargarDatosIniciales();

            // Eventos de filtros
            document.getElementById('branchFilter').addEventListener('change', filtrarVistaActual);
            document.getElementById('estatusFilter').addEventListener('change', filtrarVistaActual);
            document.getElementById('busquedaInput').addEventListener('input', filtrarVistaActual);

            // Eventos de cambio de items por página
            document.getElementById('itemsPerPage').addEventListener('change', function () {
                itemsPerPage = parseInt(this.value);
                currentPage = 1;
                mostrarRegistrosEnTabla();
            });

            // Eventos de paginación
            document.getElementById('firstPage').addEventListener('click', () => goToPage(1));
            document.getElementById('prevPage').addEventListener('click', () => goToPage(currentPage - 1));
            document.getElementById('nextPage').addEventListener('click', () => goToPage(currentPage + 1));
            document.getElementById('lastPage').addEventListener('click', () => goToPage(totalPages));

            // Evento para agregar
            document.getElementById('btnAgregar').addEventListener('click', () => {
                alert('Funcionalidad para agregar nuevo registro');
            });

            console.log('✅ Aplicación inicializada correctamente');
        });
    </script>
</body>

</html>
